name: Generate Profile Card
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: pip install pillow numpy requests

      - name: Generate profile card
        run: python generate_profile.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install dotenv

      - name: Generate contribution graph
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: node generate.js

      - name: Commit and push changes
        run: |
          git config --local user.name "cloudia-cassandra"
          git config --local user.email "257376124+cloudia-cassandra@users.noreply.github.com"
          git add dark.svg light.svg contribution-graph-dark.svg contribution-graph-light.svg
          git commit -m "Update profile card and contribution graph" || echo "No changes to commit"
          git push
